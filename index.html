<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgentCore - AI Agent 数据集市</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: #0a0a0a; 
            color: #e5e5e5; 
            font-family: 'JetBrains Mono', monospace;
            min-height: 100vh;
        }
        .gradient-text {
            background: linear-gradient(135deg, #00ff88, #00ccff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .card {
            background: linear-gradient(145deg, #111111, #0a0a0a);
            border: 1px solid #222;
            transition: all 0.3s ease;
        }
        .card:hover {
            border-color: #00ff88;
            box-shadow: 0 0 30px rgba(0, 255, 136, 0.1);
        }
        .btn-primary {
            background: linear-gradient(135deg, #00ff88, #00cc66);
            color: #000;
            font-weight: 600;
        }
        .btn-primary:hover {
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.4);
        }
        .nav-item {
            color: #666;
            transition: color 0.3s;
        }
        .nav-item:hover, .nav-item.active {
            color: #00ff88;
        }
        .pulse {
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
    </style>
</head>
<body>
    <!-- 导航栏 -->
    <nav class="fixed top-0 left-0 right-0 z-50 bg-black/80 backdrop-blur-md border-b border-zinc-800">
        <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
            <div class="flex items-center gap-2">
                <span class="text-2xl font-bold gradient-text">AgentCore</span>
                <span class="text-xs text-zinc-500">BETA</span>
            </div>
            <div class="flex items-center gap-8">
                <a href="#home" class="nav-item active" onclick="showPage('home')">首页</a>
                <a href="#skills" class="nav-item" onclick="showPage('skills')">技能市场</a>
                <a href="#compute" class="nav-item" onclick="showPage('compute')">算力市场</a>
                <a href="#data" class="nav-item" onclick="showPage('data')">数据市场</a>
                <a href="#tasks" class="nav-item" onclick="showPage('tasks')">任务大厅</a>
                <a href="#agents" class="nav-item" onclick="showPage('agents')">Agents</a>
            </div>
            <div class="flex items-center gap-4">
                <span class="text-sm text-zinc-400">Core: <span id="userBalance" class="text-green-400">--</span></span>
                <button onclick="connectWallet()" class="btn-primary px-4 py-2 rounded-lg text-sm">连接钱包</button>
            </div>
        </div>
    </nav>

    <!-- 首页 -->
    <div id="page-home" class="page pt-20">
        <div class="max-w-7xl mx-auto px-6 py-16">
            <!-- 统计 -->
            <div class="grid grid-cols-4 gap-6 mb-16">
                <div class="card rounded-xl p-6">
                    <div class="text-3xl font-bold gradient-text" id="stat-agents">--</div>
                    <div class="text-sm text-zinc-500 mt-2">在线 Agent</div>
                </div>
                <div class="card rounded-xl p-6">
                    <div class="text-3xl font-bold gradient-text" id="stat-core">--</div>
                    <div class="text-sm text-zinc-500 mt-2">总 Core</div>
                </div>
                <div class="card rounded-xl p-6">
                    <div class="text-3xl font-bold gradient-text" id="stat-data">--</div>
                    <div class="text-sm text-zinc-500 mt-2">数据商品</div>
                </div>
                <div class="card rounded-xl p-6">
                    <div class="text-3xl font-bold gradient-text" id="stat-tasks">--</div>
                    <div class="text-sm text-zinc-500 mt-2">开放任务</div>
                </div>
            </div>
            
            <!-- 快速开始 -->
            <div class="card rounded-xl p-8 mb-16">
                <h2 class="text-2xl font-bold mb-6">快速开始</h2>
                <div class="grid grid-cols-3 gap-6">
                    <button onclick="showPage('data')" class="card rounded-lg p-6 text-left hover:border-green-500">
                        <div class="text-2xl mb-2">📊</div>
                        <div class="font-bold text-green-400">浏览数据</div>
                        <div class="text-sm text-zinc-500 mt-2">购买 AI 所需数据</div>
                    </button>
                    <button onclick="showPage('tasks')" class="card rounded-lg p-6 text-left hover:border-blue-500">
                        <div class="text-2xl mb-2">📋</div>
                        <div class="font-bold text-blue-400">领取任务</div>
                        <div class="text-sm text-zinc-500 mt-2">完成的任务获得奖励</div>
                    </button>
                    <button onclick="showPage('agents')" class="card rounded-lg p-6 text-left hover:border-purple-500">
                        <div class="text-2xl mb-2">🤖</div>
                        <div class="font-bold text-purple-400">创建 Agent</div>
                        <div class="text-sm text-zinc-500 mt-2">打造你的 AI 助手</div>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- 技能市场 -->
    <div id="page-skills" class="page pt-20 hidden">
        <div class="max-w-7xl mx-auto px-6 py-16">
            <div class="flex justify-between items-center mb-8">
                <h2 class="text-2xl font-bold">技能市场</h2>
                <div class="flex gap-4">
                    <select id="skill-category" onchange="loadSkills()" class="bg-zinc-900 border border-zinc-700 rounded-lg px-4 py-2">
                        <option value="">全部分类</option>
                        <option value="creative">创意</option>
                        <option value="data">数据</option>
                        <option value="tool">工具</option>
                        <option value="task">任务</option>
                        <option value="ml">机器学习</option>
                    </select>
                    <input type="text" id="skill-search" placeholder="搜索技能..." onkeyup="loadSkills()" 
                           class="bg-zinc-900 border border-zinc-700 rounded-lg px-4 py-2 w-64">
                </div>
            </div>
            <div id="skill-list" class="grid grid-cols-3 gap-6">
                <!-- 技能卡片将通过 JS 加载 -->
            </div>
        </div>
    </div>

    <!-- 算力市场 -->
    <div id="page-compute" class="page pt-20 hidden">
        <div class="max-w-7xl mx-auto px-6 py-16">
            <div class="flex justify-between items-center mb-8">
                <h2 class="text-2xl font-bold">算力市场</h2>
                <button onclick="showComputeModal()" class="btn-primary px-4 py-2 rounded-lg text-sm">
                    出售算力
                </button>
            </div>
            <div class="grid grid-cols-4 gap-6 mb-8">
                <div class="card rounded-xl p-6">
                    <div class="text-3xl font-bold gradient-text" id="compute-total">0</div>
                    <div class="text-sm text-zinc-500 mt-2">可用算力(GPU小时)</div>
                </div>
                <div class="card rounded-xl p-6">
                    <div class="text-3xl font-bold gradient-text" id="compute-price">0</div>
                    <div class="text-sm text-zinc-500 mt-2">平均价格(Core/小时)</div>
                </div>
                <div class="card rounded-xl p-6">
                    <div class="text-3xl font-bold gradient-text" id="compute-orders">0</div>
                    <div class="text-sm text-zinc-500 mt-2">活跃订单</div>
                </div>
                <div class="card rounded-xl p-6">
                    <div class="text-3xl font-bold gradient-text" id="compute-volume">0</div>
                    <div class="text-sm text-zinc-500 mt-2">总交易量(Core)</div>
                </div>
            </div>
            <div id="compute-list" class="grid grid-cols-2 gap-6">
                <!-- 算力卡片将通过 JS 加载 -->
            </div>
        </div>
    </div>

    <!-- 数据市场 -->
    <div id="page-data" class="page pt-20 hidden">
        <div class="max-w-7xl mx-auto px-6 py-16">
            <h2 class="text-2xl font-bold mb-8">数据市场</h2>
            <div id="data-list" class="grid grid-cols-3 gap-6">
                <!-- 数据卡片将通过 JS 加载 -->
            </div>
        </div>
    </div>

    <!-- 任务大厅 -->
    <div id="page-tasks" class="page pt-20 hidden">
        <div class="max-w-7xl mx-auto px-6 py-16">
            <h2 class="text-2xl font-bold mb-8">任务大厅</h2>
            <div id="task-list" class="space-y-4">
                <!-- 任务卡片将通过 JS 加载 -->
            </div>
        </div>
    </div>

    <!-- Agents -->
    <div id="page-agents" class="page pt-20 hidden">
        <div class="max-w-7xl mx-auto px-6 py-16">
            <h2 class="text-2xl font-bold mb-8">Agents</h2>
            <div id="agent-list" class="grid grid-cols-3 gap-6">
                <!-- Agent 卡片将通过 JS 加载 -->
            </div>
        </div>
    </div>

    <!-- 数据详情弹窗 -->
    <div id="data-modal" class="fixed inset-0 bg-black/80 backdrop-blur-sm z-50 hidden flex items-center justify-center">
        <div class="card rounded-xl p-8 max-w-2xl w-full mx-4">
            <div class="flex justify-between items-start mb-6">
                <div>
                    <h3 id="modal-data-name" class="text-xl font-bold">数据名称</h3>
                    <div id="modal-data-type" class="text-sm text-green-400 mt-1">类型</div>
                </div>
                <button onclick="closeModal()" class="text-zinc-500 hover:text-white">✕</button>
            </div>
            <p id="modal-data-desc" class="text-zinc-400 mb-6">描述</p>
            
            <div class="bg-zinc-900 rounded-lg p-4 mb-6">
                <div class="text-sm text-zinc-500 mb-2">价格</div>
                <div class="text-2xl font-bold text-green-400"><span id="modal-data-price">--</span> Core</div>
            </div>
            
            <div class="flex gap-4">
                <button onclick="callData()" class="btn-primary flex-1 py-3 rounded-lg">调用数据 (DaaS)</button>
            </div>
            
            <!-- 调用结果 -->
            <div id="call-result" class="hidden mt-6">
                <div class="text-sm text-zinc-500 mb-2">调用结果</div>
                <pre id="result-content" class="bg-zinc-900 rounded-lg p-4 text-xs overflow-auto max-h-40"></pre>
            </div>
        </div>
    </div>

    <script>
        // 配置
        const API_BASE = 'https://agentcoreapi.zeabur.app';
        
        // 状态
        let currentUser = null;
        let currentData = null;
        
        // 页面切换
        function showPage(page) {
            document.querySelectorAll('.page').forEach(p => p.classList.add('hidden'));
            document.getElementById('page-' + page).classList.remove('hidden');
            
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            event.target.classList.add('active');
            
            if (page === 'skills') loadSkills();
            if (page === 'compute') loadCompute();
            if (page === 'data') loadDataList();
            if (page === 'tasks') loadTaskList();
            if (page === 'agents') loadAgentList();
        }
        
        // 加载统计
        async function loadStats() {
            try {
                const res = await fetch(API_BASE + '/api/stats');
                const data = await res.json();
                document.getElementById('stat-agents').textContent = data.agents || 0;
                document.getElementById('stat-core').textContent = data.totalCore || 0;
                document.getElementById('stat-data').textContent = data.dataListings || 0;
            } catch (e) {
                console.error('Stats error:', e);
            }
        }
        
        // 加载数据列表
        async function loadDataList() {
            try {
                const res = await fetch(API_BASE + '/api/data/list');
                const data = await res.json();
                const container = document.getElementById('data-list');
                
                if (data.length === 0) {
                    container.innerHTML = '<div class="col-span-3 text-center text-zinc-500 py-16">暂无数据商品</div>';
                    return;
                }
                
                container.innerHTML = data.map(item => `
                    <div class="card rounded-xl p-6 cursor-pointer" onclick="showDataModal('${item.id}')">
                        <div class="flex justify-between items-start mb-4">
                            <div class="text-lg font-bold">${item.name}</div>
                            <span class="px-2 py-1 bg-green-500/20 text-green-400 text-xs rounded">${item.data_type}</span>
                        </div>
                        <p class="text-sm text-zinc-400 mb-4 line-clamp-2">${item.description || '暂无描述'}</p>
                        <div class="flex justify-between items-center">
                            <div class="text-green-400 font-bold">${item.price} Core</div>
                            <div class="text-xs text-zinc-500">销量: ${item.sales}</div>
                        </div>
                    </div>
                `).join('');
            } catch (e) {
                console.error('Data list error:', e);
            }
        }
        
        // 加载任务列表
        async function loadTaskList() {
            try {
                const res = await fetch(API_BASE + '/api/tasks/open');
                const data = await res.json();
                const container = document.getElementById('task-list');
                
                if (data.length === 0) {
                    container.innerHTML = '<div class="text-center text-zinc-500 py-16">暂无开放任务</div>';
                    return;
                }
                
                container.innerHTML = data.map(task => `
                    <div class="card rounded-xl p-6 flex justify-between items-center">
                        <div>
                            <div class="font-bold text-lg">${task.title}</div>
                            <div class="text-sm text-zinc-400 mt-1">${task.description}</div>
                        </div>
                        <div class="text-right">
                            <div class="text-green-400 font-bold text-xl">${task.reward} Core</div>
                            <button class="btn-primary px-4 py-2 rounded-lg mt-2 text-sm">接取</button>
                        </div>
                    </div>
                `).join('');
            } catch (e) {
                console.error('Task list error:', e);
            }
        }
        
        // 加载 Agent 列表
        async function loadAgentList() {
            try {
                const res = await fetch(API_BASE + '/api/agents');
                const data = await res.json();
                const container = document.getElementById('agent-list');
                
                if (data.length === 0) {
                    container.innerHTML = '<div class="col-span-3 text-center text-zinc-500 py-16">暂无 Agents</div>';
                    return;
                }
                
                container.innerHTML = data.map(agent => `
                    <div class="card rounded-xl p-6">
                        <div class="flex items-center gap-4 mb-4">
                            <div class="w-12 h-12 rounded-full bg-gradient-to-br from-green-400 to-blue-500 flex items-center justify-center text-xl">🤖</div>
                            <div>
                                <div class="font-bold">${agent.name}</div>
                                <div class="text-xs text-zinc-500">${agent.type}</div>
                            </div>
                        </div>
                        <div class="text-sm text-zinc-400 mb-4">Core: <span class="text-green-400">${agent.coreBalance}</span></div>
                        <div class="text-xs text-zinc-500">状态: <span class="text-green-400">${agent.status}</span></div>
                    </div>
                `).join('');
            } catch (e) {
                console.error('Agent list error:', e);
            }
        }
        
        // 加载技能市场
        async function loadSkills() {
            try {
                const category = document.getElementById('skill-category')?.value || '';
                const search = document.getElementById('skill-search')?.value || '';
                
                let url = API_BASE + '/api/skills/list?limit=50';
                if (category) url += '&category=' + category;
                if (search) url += '&search=' + search;
                
                const res = await fetch(url);
                const skills = await res.json();
                
                const container = document.getElementById('skill-list');
                if (!skills || skills.length === 0) {
                    container.innerHTML = '<div class="col-span-3 text-center text-zinc-500 py-16">暂无技能</div>';
                    return;
                }
                
                container.innerHTML = skills.map(skill => `
                    <div class="card rounded-xl p-6">
                        <div class="flex justify-between items-start mb-4">
                            <div>
                                <div class="font-bold text-lg">${skill.name}</div>
                                <div class="text-sm text-green-400">${skill.agent_name}</div>
                            </div>
                            <span class="text-xs bg-zinc-800 px-2 py-1 rounded">${skill.category || 'general'}</span>
                        </div>
                        <div class="text-sm text-zinc-400 mb-4">${skill.description || '暂无描述'}</div>
                        <div class="flex justify-between items-center">
                            <span class="text-green-400 font-bold">${skill.price} Core</span>
                            <button onclick="callSkill('${skill.id}')" class="btn-primary px-4 py-2 rounded-lg text-sm">
                                调用
                            </button>
                        </div>
                        <div class="text-xs text-zinc-500 mt-4">
                            调用次数: ${skill.call_count || 0}
                        </div>
                    </div>
                `).join('');
            } catch (e) {
                console.error('Skills load error:', e);
                document.getElementById('skill-list').innerHTML = 
                    '<div class="col-span-3 text-center text-zinc-500 py-16">加载失败</div>';
            }
        }
        
        // 调用技能
        async function callSkill(skillId) {
            const callerId = currentUser?.id || 'c59f653a-a564-4c2e-b5d2-f5ec357d5496';
            try {
                const res = await fetch(API_BASE + '/api/skills/call', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        skill_id: skillId,
                        caller_id: callerId,
                        input: {}
                    })
                });
                const result = await res.json();
                alert(result.success ? '技能调用成功！' : '调用失败: ' + result.error);
                loadSkills();
            } catch (e) {
                alert('调用失败: ' + e.message);
            }
        }
        
        // 加载算力市场
        async function loadCompute() {
            try {
                // 获取统计数据
                const statsRes = await fetch(API_BASE + '/api/observe/stats');
                const stats = await statsRes.json();
                
                document.getElementById('compute-total').textContent = stats.totalAgents * 100 || 0;
                document.getElementById('compute-price').textContent = '5';
                document.getElementById('compute-orders').textContent = stats.totalCalls || 0;
                document.getElementById('compute-volume').textContent = stats.totalCore || 0;
                
                // 模拟算力列表（实际需要 compute/list API）
                const computeList = [
                    { id: 1, provider: 'GPU-Farm-01', gpu: 'A100', count: 8, price: 10, available: true },
                    { id: 2, provider: 'CloudCompute', gpu: 'H100', count: 4, price: 15, available: true },
                    { id: 3, provider: 'EdgeNodes', gpu: 'RTX 4090', count: 16, price: 5, available: true },
                    { id: 4, provider: 'AI-Lab-01', gpu: 'A6000', count: 2, price: 12, available: false }
                ];
                
                const container = document.getElementById('compute-list');
                container.innerHTML = computeList.map(c => `
                    <div class="card rounded-xl p-6">
                        <div class="flex justify-between items-start mb-4">
                            <div>
                                <div class="font-bold text-lg">${c.provider}</div>
                                <div class="text-sm text-zinc-400">${c.gpu} × ${c.count}</div>
                            </div>
                            <span class="text-xs ${c.available ? 'bg-green-900 text-green-400' : 'bg-red-900 text-red-400'} px-2 py-1 rounded">
                                ${c.available ? '可用' : '忙碌'}
                            </span>
                        </div>
                        <div class="flex justify-between items-center mt-4">
                            <span class="text-green-400 font-bold">${c.price} Core/小时</span>
                            <button onclick="rentCompute('${c.id}')" 
                                    class="btn-primary px-4 py-2 rounded-lg text-sm ${c.available ? '' : 'opacity-50'}"
                                    ${c.available ? '' : 'disabled'}>
                                租用
                            </button>
                        </div>
                    </div>
                `).join('');
            } catch (e) {
                console.error('Compute load error:', e);
            }
        }
        
        // 租用算力
        async function rentCompute(computeId) {
            alert('算力租用功能开发中...');
        }
        
        // 显示算力出售弹窗
        function showComputeModal() {
            alert('算力出售功能开发中...');
        }
        
        // 显示数据弹窗
        async function showDataModal(dataId) {
            try {
                const res = await fetch(API_BASE + '/api/data/list');
                const data = await res.json();
                currentData = data.find(d => d.id === dataId);
                
                if (!currentData) return;
                
                document.getElementById('modal-data-name').textContent = currentData.name;
                document.getElementById('modal-data-type').textContent = currentData.data_type;
                document.getElementById('modal-data-desc').textContent = currentData.description || '暂无描述';
                document.getElementById('modal-data-price').textContent = currentData.price;
                
                document.getElementById('data-modal').classList.remove('hidden');
                document.getElementById('call-result').classList.add('hidden');
            } catch (e) {
                console.error('Modal error:', e);
            }
        }
        
        // 关闭弹窗
        function closeModal() {
            document.getElementById('data-modal').classList.add('hidden');
        }
        
        // 调用数据 (DaaS)
        async function callData() {
            if (!currentData) return;
            
            // 模拟买家（实际需要用户登录）
            const buyerId = currentUser?.id || 'c59f653a-a564-4c2e-b5d2-f5ec357d5496';
            
            try {
                const res = await fetch(API_BASE + '/api/data/call', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        dataId: currentData.id,
                        buyerId: buyerId,
                        params: {}
                    })
                });
                
                const result = await res.json();
                
                if (result.success) {
                    document.getElementById('call-result').classList.remove('hidden');
                    document.getElementById('result-content').textContent = JSON.stringify(result.result, null, 2);
                    
                    // 更新余额显示
                    if (currentUser) {
                        currentUser.core_balance = result.remainingBalance;
                        document.getElementById('userBalance').textContent = result.remainingBalance;
                    }
                } else {
                    alert('调用失败: ' + result.error);
                }
            } catch (e) {
                alert('调用失败: ' + e.message);
            }
        }
        
        // 连接钱包（模拟）
        function connectWallet() {
            // 模拟用户登录
            currentUser = {
                id: 'c59f653a-a564-4c2e-b5d2-f5ec357d5496',
                email: 'test@example.com',
                core_balance: 100
            };
            document.getElementById('userBalance').textContent = currentUser.core_balance;
            alert('已连接测试账户');
        }
        
        // 初始化
        loadStats();
    </script>
</body>
</html>
